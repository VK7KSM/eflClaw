name: Build elfClaw

# Triggers:
#   - Push a tag "v*"  → build + publish GitHub Release
#   - Manual dispatch  → build artifacts (optionally publish if release_tag is given)
on:
    workflow_dispatch:
        inputs:
            release_tag:
                description: "Release tag to publish (e.g. v0.2.0). Leave empty for artifact-only build."
                required: false
                default: ""
                type: string
            draft:
                description: "Create release as draft"
                required: false
                default: true
                type: boolean
    push:
        tags:
            - "v*"

concurrency:
    group: build-elfclaw-${{ github.ref || github.run_id }}
    cancel-in-progress: false

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always

jobs:
    # ─────────────────────────────────────────────────────────────────────────
    # Linux + Android + FreeBSD — all via `cross` (Docker-based, zero env setup)
    # ─────────────────────────────────────────────────────────────────────────
    build-cross:
        name: Build ${{ matrix.target }}
        runs-on: ubuntu-22.04
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                include:
                    # ── Linux GNU ──────────────────────────────────────────
                    - target: x86_64-unknown-linux-gnu
                      archive: zeroclaw-x86_64-linux-gnu.tar.gz
                    - target: aarch64-unknown-linux-gnu
                      archive: zeroclaw-aarch64-linux-gnu.tar.gz
                    - target: armv7-unknown-linux-gnueabihf
                      archive: zeroclaw-armv7-linux-gnu.tar.gz
                    - target: arm-unknown-linux-gnueabihf
                      archive: zeroclaw-armv6-linux-gnu.tar.gz
                    - target: i686-unknown-linux-gnu
                      archive: zeroclaw-i686-linux-gnu.tar.gz
                    # ── Linux MUSL (static, runs without glibc) ───────────
                    - target: x86_64-unknown-linux-musl
                      archive: zeroclaw-x86_64-linux-musl.tar.gz
                    - target: aarch64-unknown-linux-musl
                      archive: zeroclaw-aarch64-linux-musl.tar.gz
                    - target: armv7-unknown-linux-musleabihf
                      archive: zeroclaw-armv7-linux-musl.tar.gz
                    - target: arm-unknown-linux-musleabihf
                      archive: zeroclaw-armv6-linux-musl.tar.gz
                    # ── Android ───────────────────────────────────────────
                    - target: aarch64-linux-android
                      archive: zeroclaw-aarch64-android.tar.gz
                    - target: armv7-linux-androideabi
                      archive: zeroclaw-armv7-android.tar.gz
                    - target: x86_64-linux-android
                      archive: zeroclaw-x86_64-android.tar.gz
                    # ── FreeBSD ───────────────────────────────────────────
                    - target: x86_64-unknown-freebsd
                      archive: zeroclaw-x86_64-freebsd.tar.gz

        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
                  targets: ${{ matrix.target }}

            - uses: Swatinem/rust-cache@v2
              with:
                  key: cross-${{ matrix.target }}

            - name: Install cross
              run: |
                  cargo install cross --git https://github.com/cross-rs/cross \
                    --rev 085092c || true
                  cross --version

            - name: Build with cross
              run: cross build --release --locked --target ${{ matrix.target }}

            - name: Package
              run: |
                  cd target/${{ matrix.target }}/release
                  tar czf ../../../${{ matrix.archive }} zeroclaw

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.archive }}
                  path: ${{ matrix.archive }}
                  retention-days: 14

    # ─────────────────────────────────────────────────────────────────────────
    # macOS — native runners (x86_64 Intel + Apple Silicon)
    # ─────────────────────────────────────────────────────────────────────────
    build-macos:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-13
                      target: x86_64-apple-darwin
                      archive: zeroclaw-x86_64-macos.tar.gz
                    - os: macos-14
                      target: aarch64-apple-darwin
                      archive: zeroclaw-aarch64-macos.tar.gz

        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
                  targets: ${{ matrix.target }}

            - uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Build
              run: cargo build --release --locked --target ${{ matrix.target }}

            - name: Package
              run: |
                  cd target/${{ matrix.target }}/release
                  tar czf ../../../${{ matrix.archive }} zeroclaw

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.archive }}
                  path: ${{ matrix.archive }}
                  retention-days: 14

    # ─────────────────────────────────────────────────────────────────────────
    # Windows — native runner (MSVC)
    # ─────────────────────────────────────────────────────────────────────────
    build-windows:
        name: Build x86_64-pc-windows-msvc
        runs-on: windows-latest
        timeout-minutes: 60

        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
                  targets: x86_64-pc-windows-msvc

            - uses: Swatinem/rust-cache@v2
              with:
                  key: x86_64-pc-windows-msvc

            - name: Build
              run: cargo build --release --locked --target x86_64-pc-windows-msvc

            - name: Package
              run: |
                  cd target/x86_64-pc-windows-msvc/release
                  7z a ../../../zeroclaw-x86_64-windows.zip zeroclaw.exe

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: zeroclaw-x86_64-windows.zip
                  path: zeroclaw-x86_64-windows.zip
                  retention-days: 14

    # ─────────────────────────────────────────────────────────────────────────
    # Create GitHub Release (runs after all builds)
    # ─────────────────────────────────────────────────────────────────────────
    release:
        name: Create GitHub Release
        needs: [build-cross, build-macos, build-windows]
        runs-on: ubuntu-latest
        if: >
            github.event_name == 'push' ||
            (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')

        steps:
            - uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true

            - name: Generate SHA256 checksums
              run: |
                  cd dist
                  sha256sum * | sort > SHA256SUMS.txt
                  echo "=== Artifacts ==="
                  ls -lh
                  echo "=== Checksums ==="
                  cat SHA256SUMS.txt

            - name: Determine release tag
              id: tag
              run: |
                  if [[ "${{ github.event_name }}" == "push" ]]; then
                    echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.tag.outputs.tag }}
                  draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft == 'true' }}
                  generate_release_notes: true
                  files: dist/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
