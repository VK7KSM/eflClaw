name: Build elfClaw

# Triggers:
#   - Push a tag "v*"  → build + publish GitHub Release
#   - Manual dispatch  → build artifacts (optionally publish if release_tag is given)
on:
    workflow_dispatch:
        inputs:
            release_tag:
                description: "Release tag to publish (e.g. v0.2.0). Leave empty for artifact-only build."
                required: false
                default: ""
                type: string
            draft:
                description: "Create release as draft"
                required: false
                default: true
                type: boolean
    push:
        tags:
            - "v*"

concurrency:
    group: build-elfclaw-${{ github.ref || github.run_id }}
    cancel-in-progress: false

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always

jobs:
    # ─────────────────────────────────────────────────────────────────────────
    # macOS — Apple Silicon (aarch64); Intel Mac dropped: macOS 15 requires
    # Apple Silicon, and GitHub retired the macos-13 Intel runner.
    # ─────────────────────────────────────────────────────────────────────────
    build-macos:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-15
                      target: aarch64-apple-darwin
                      archive: elfclaw-aarch64-macos.tar.gz

        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
                  targets: ${{ matrix.target }}

            - uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Build
              run: cargo build --release --locked --target ${{ matrix.target }}

            - name: Package
              run: |
                  cd target/${{ matrix.target }}/release
                  tar czf ../../../${{ matrix.archive }} zeroclaw

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.archive }}
                  path: ${{ matrix.archive }}
                  retention-days: 14

    # ─────────────────────────────────────────────────────────────────────────
    # Windows — native runner (MSVC)
    # ─────────────────────────────────────────────────────────────────────────
    build-windows:
        name: Build x86_64-pc-windows-msvc
        runs-on: windows-latest
        timeout-minutes: 60

        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
                  targets: x86_64-pc-windows-msvc

            - uses: Swatinem/rust-cache@v2
              with:
                  key: x86_64-pc-windows-msvc

            - name: Build
              run: cargo build --release --locked --target x86_64-pc-windows-msvc

            - name: Package
              run: |
                  cd target/x86_64-pc-windows-msvc/release
                  7z a ../../../elfclaw-x86_64-windows.zip zeroclaw.exe

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: elfclaw-x86_64-windows.zip
                  path: elfclaw-x86_64-windows.zip
                  retention-days: 14

    # ─────────────────────────────────────────────────────────────────────────
    # Create GitHub Release (runs after all builds)
    # ─────────────────────────────────────────────────────────────────────────
    release:
        name: Create GitHub Release
        needs: [build-macos, build-windows]
        runs-on: ubuntu-latest
        if: >
            github.event_name == 'push' ||
            (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')

        steps:
            - uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v8
              with:
                  path: dist
                  merge-multiple: true

            - name: Generate SHA256 checksums
              run: |
                  cd dist
                  sha256sum * | sort > SHA256SUMS.txt
                  echo "=== Artifacts ==="
                  ls -lh
                  echo "=== Checksums ==="
                  cat SHA256SUMS.txt

            - name: Determine release tag
              id: tag
              run: |
                  if [[ "${{ github.event_name }}" == "push" ]]; then
                    echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.tag.outputs.tag }}
                  draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft == 'true' }}
                  generate_release_notes: true
                  files: dist/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
